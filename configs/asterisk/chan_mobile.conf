[general]

; === Bluetooth adapter (Belkin Broadcom 4.0) ===
[adapter]
type = adapter
address = 5C:F3:70:85:9C:08
id = hci0
forcemaster = yes
alignmentdetection = yes

; === Android phone ===
; After pairing, run: asterisk -rx "mobile search"
; Update the address below with the Android phone's BD address.
; Update the port with the RFCOMM channel from "mobile search".
[android]
type = phone
address = ANDROID_BD_ADDRESS_HERE
port = 1
context = incoming-mobile
adapter = adapter
group = 1
