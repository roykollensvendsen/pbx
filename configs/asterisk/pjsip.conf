; === Transport ===

[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; === Extension 101 ===

[101]
type = endpoint
context = internal
disallow = all
allow = ulaw
allow = alaw
auth = auth101
aors = 101
callerid = "Ext 101" <101>

[auth101]
type = auth
auth_type = userpass
username = 101
password = pbxpass2024

[101]
type = aor
max_contacts = 1
remove_existing = yes

