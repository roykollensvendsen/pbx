[general]

; Bridge profile for incoming mobile calls
[mobile-bridge]
type = bridge
max_members = 10

; The caller from mobile — marked user. When they hang up, conference ends.
[mobile-caller]
type = user
marked = yes
end_marked = no
announce_user_count = no
quiet = yes

; Phone users — when all marked users leave, they get kicked.
[mobile-phone]
type = user
marked = no
end_marked = yes
announce_user_count = no
