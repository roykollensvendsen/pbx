[general]
static = yes
writeprotect = no

; === Internal calls between extensions + outgoing via mobile ===
[internal]
; Echo test
exten => *43,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Extension-to-extension dialing
exten => 101,1,Dial(PJSIP/101,60)
exten => 102,1,Dial(PJSIP/102,60)
exten => 103,1,Dial(PJSIP/103,60)

; Outgoing calls via Android mobile bridge
; Match any number with 3+ digits (avoids matching internal extensions)
exten => _XXX.,1,NoOp(Outgoing call to ${EXTEN} via mobile)
 same => n,Dial(Mobile/android/${EXTEN},60)
 same => n,Hangup()

; === Incoming calls from Android mobile ===
; All 3 phones ring. Any/all can answer and join the same conference.
; When the cellular caller hangs up, all phones are disconnected.
[incoming-mobile]
exten => s,1,NoOp(Incoming cellular call)
 same => n,Answer()
 same => n,Originate(PJSIP/101,exten,conf-mobile-join,s,1,60,a)
 same => n,Originate(PJSIP/102,exten,conf-mobile-join,s,1,60,a)
 same => n,Originate(PJSIP/103,exten,conf-mobile-join,s,1,60,a)
 same => n,ConfBridge(mobile-incoming,mobile-bridge,mobile-caller)
 same => n,Hangup()

; Phones that answer join the conference
[conf-mobile-join]
exten => s,1,ConfBridge(mobile-incoming,mobile-bridge,mobile-phone)
 same => n,Hangup()
