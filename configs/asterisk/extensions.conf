[general]
static = yes
writeprotect = no

; === Internal calls between extensions + outgoing via mobile ===
[internal]
; Echo test
exten => *43,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; AI agent (AudioSocket to Node.js server)
exten => 104,1,Answer()
 same => n,System(echo '${CALLERID(num)}|${CALLERID(name)}|${CHANNEL(name)}' > /tmp/agent-callerid && chmod 666 /tmp/agent-callerid)
 same => n,AudioSocket(00000000-0000-0000-0000-000000000104,127.0.0.1:9092)
 same => n,Hangup()

; Extension-to-extension dialing
exten => 101,1,Dial(PJSIP/101,60)
exten => 102,1,Dial(PJSIP/102,60)
exten => 103,1,Dial(PJSIP/103,60)

; Outgoing calls via Android mobile bridge
; Match any number with 3+ digits (avoids matching internal extensions)
exten => _XXX.,1,NoOp(Outgoing call to ${EXTEN} via mobile)
 same => n,Dial(Mobile/android/${EXTEN},60)
 same => n,Hangup()

; === Incoming calls from Android mobile ===
; All 3 phones ring for 15 seconds. If nobody answers, AI agent picks up.
[incoming-mobile]
exten => s,1,NoOp(Incoming cellular call)
 same => n,Dial(PJSIP/101&PJSIP/102&PJSIP/103,15)
 same => n,GotoIf($["${DIALSTATUS}" = "ANSWER"]?done)
 same => n,System(echo '${CALLERID(num)}|${CALLERID(name)}|${CHANNEL(name)}' > /tmp/agent-callerid && chmod 666 /tmp/agent-callerid)
 same => n,Dial(Local/104@internal,300)
 same => n(done),Hangup()

; === Agent-initiated outbound calls ===
[outbound-agent]
exten => _X.,1,NoOp(Agent-initiated outbound call to ${EXTEN})
 same => n,Dial(Mobile/android/${EXTEN},60)
 same => n,Hangup()

; === Agent-initiated internal transfers ===
[transfer-agent]
exten => 101,1,NoOp(Agent transfer to ext 101)
 same => n,Dial(PJSIP/101,60)
 same => n,Hangup()

exten => 102,1,NoOp(Agent transfer to ext 102)
 same => n,Dial(PJSIP/102,60)
 same => n,Hangup()

exten => 103,1,NoOp(Agent transfer to ext 103)
 same => n,Dial(PJSIP/103,60)
 same => n,Hangup()
