[general]
static = yes
writeprotect = no

; === Internal calls between extensions + outgoing via mobile ===
[internal]
; Echo test
exten => *43,1,Answer()
 same => n,Echo()
 same => n,Hangup()

; Check voicemail
exten => *97,1,Answer()
 same => n,VoiceMailMain(100@default)
 same => n,Hangup()

; Extension-to-extension dialing
exten => 101,1,Dial(PJSIP/101,60)
exten => 102,1,Dial(PJSIP/102,60)
exten => 103,1,Dial(PJSIP/103,60)

; Outgoing calls via Android mobile bridge
; Match any number with 3+ digits (avoids matching internal extensions)
exten => _XXX.,1,NoOp(Outgoing call to ${EXTEN} via mobile)
 same => n,Dial(Mobile/android/${EXTEN},60)
 same => n,Hangup()

; === Incoming calls from Android mobile ===
; All 3 phones ring. Any/all can answer and join the same conference.
; When the cellular caller hangs up, all phones are disconnected.
; If nobody answers within 25 seconds, caller goes to voicemail.
[incoming-mobile]
exten => s,1,NoOp(Incoming cellular call)
 same => n,Answer()
 same => n,Set(GLOBAL(MOBILE_ANSWERED)=0)
 same => n,Originate(PJSIP/101,exten,conf-mobile-join,s,1,25,a)
 same => n,Originate(PJSIP/102,exten,conf-mobile-join,s,1,25,a)
 same => n,Originate(PJSIP/103,exten,conf-mobile-join,s,1,25,a)
 same => n,Originate(Local/s@mobile-vm-watchdog,app,Wait,60,,a)
 same => n,ConfBridge(mobile-incoming,mobile-bridge,mobile-caller)
 same => n,GotoIf($["${GLOBAL(MOBILE_ANSWERED)}" = "1"]?done)
 same => n,VoiceMail(100@default,u)
 same => n(done),Hangup()

; Watchdog: if nobody answers within 25s, kick caller out of conference → falls through to voicemail
[mobile-vm-watchdog]
exten => s,1,Wait(25)
 same => n,GotoIf($["${GLOBAL(MOBILE_ANSWERED)}" = "1"]?done)
 same => n,ConfKick(mobile-incoming,all)
 same => n(done),Hangup()

; Phones that answer join the conference
[conf-mobile-join]
exten => s,1,Set(GLOBAL(MOBILE_ANSWERED)=1)
 same => n,ConfBridge(mobile-incoming,mobile-bridge,mobile-phone)
 same => n,Hangup()
