# Disable Bluetooth in WirePlumber to prevent PipeWire from claiming
# HFP/HSP profiles, which would block Asterisk chan_mobile from
# accessing SCO audio on the Bluetooth adapter.
profile.rules = [
  {
    matches = [
      {
        profile.name = "~hardware.bluetooth.*"
      }
    ]
    actions = {
      override = {
        profile.disabled = true
      }
    }
  }
]
